replicaCount: 1

image:
  repository: nginx
  tag: "1.25-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "64Mi"
    cpu: "100m"

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 15

# nginx configuration — edit this to simulate an incident
nginx:
  config: |
    server {
      listen 80;
      server_name localhost;

      location / {
        root   /usr/share/nginx/html;
        index  index.html;
      
      # comment closing brace — nginx config test will fail
      }

      location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
      
      }   
    }
