# ============================================================
# PostgreSQL 
# ============================================================
postgresql:
  enabled: true
  auth:
    database: n8n
    username: n8n
    password: "n8n-db-password"
  primary:
    persistence:
      enabled: true
      size: 5Gi
      accessModes:
        - ReadWriteOnce
    service:
      type: ClusterIP
      ports:
        postgresql: 5432
