name: LinkedIn Job Tracker

networks:
  n8n_network:

volumes:
  n8n_data:
  postgres_data:

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n_server
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - ./.env
    volumes:
      - ../n8n:/home/node/.n8n
    networks:
      - n8n_network
